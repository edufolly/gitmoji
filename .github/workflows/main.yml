name: Main Release
on:
  push:
    branches: [ main ]

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Get Pubspec Version
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -c 10- | cut -f 1 -d '+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version is used
        run: |
          URL=$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/v${{ steps.get_version.outputs.VERSION }}
          CODE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" -o /dev/null -w "%{http_code}" "$URL")
          if [ "$CODE" != 404 ]; then
            echo "Release 'v${{ steps.get_version.outputs.VERSION }}' already exists. ($CODE)"
            exit 1
          fi

      - name: Creating a GitHub Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          custom_tag: ${{ steps.get_version.outputs.VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-amd64
            ext: ""
#          - runner: ubuntu-24.04-arm
#            target: linux-arm64
#            ext: ""
          - runner: macos-15-intel
            target: macos-intel
            ext: ""
          - runner: macos-15
            target: macos-silicon
            ext: ""
          - runner: windows-latest
            target: windows-amd64
            ext: ".exe"

    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - name: Update Version in Code
        shell: bash
        run: dart run tools/update_version.dart ${{ needs.prepare.outputs.VERSION }}

      - name: Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Dart Pub Get
        run: dart pub get

      - name: Dart Compile
        shell: bash
        run: |
          mkdir -p build
          dart compile exe bin/gitmoji.dart -o build/gitmoji-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitmoji-${{ matrix.target }}
          path: build/gitmoji-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          artifacts: artifacts/*
          generateReleaseNotes: true